<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-task1 | Sorting Algorithms</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <header class="app-header py-2 mb-3">
        <div class="container">
            <h1 class="h5 fw-bold mb-0">Sorting Algorithms Playground</h1>
        </div>
    </header>

    <main class="container pb-4">

        <div class="card mb-3">
            <div class="card-body py-3">
                <div class="row g-3 align-items-end">
                    <div class="col-6 col-sm-3 col-md-2">
                        <label for="arraySize" class="form-label mb-1">Size (max 30)</label>
                        <input type="number" class="form-control form-control-sm" id="arraySize" value="10" min="2" max="30">
                    </div>
                    <div class="col-auto">
                        <button type="button" id="generateBtn" class="btn btn-primary btn-sm">Generate Array</button>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-outline-primary btn-sm js-sort-btn" data-algorithm="bubbleSort">Bubble Sort</button>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-outline-dark btn-sm js-sort-btn" data-algorithm="selectionSort">Selection Sort</button>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-outline-info btn-sm js-sort-btn" data-algorithm="insertionSort">Insertion Sort</button>
                    </div>

                    <div class="col-auto ms-sm-auto">
                        <div class="d-flex gap-4">
                            <div class="text-center">
                                <div class="stat-box__value" id="statAlgorithm">—</div>
                                <div class="stat-box__label">Algorithm</div>
                            </div>
                            <div class="text-center">
                                <div class="stat-box__value" id="statIterations">—</div>
                                <div class="stat-box__label">Iterations</div>
                            </div>
                            <div class="text-center">
                                <div class="stat-box__value" id="statTime">—</div>
                                <div class="stat-box__label">Time</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <p id="emptyStateText" class="text-muted mb-0">No array generated yet.</p>
                <div id="chartContainer" class="bar-chart"></div>
            </div>
        </div>

    </main>

    <script src="static/js/sorts.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
